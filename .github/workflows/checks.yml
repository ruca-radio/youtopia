---
name: Checks

on:
  - push
  - pull_request

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Github checkout
        uses: actions/checkout@v4

      - name: Corepack Enable Yarn
        run: corepack enable yarn

      - name: Setup Node (v20)
        uses: actions/setup-node@v4
        with:
          cache: 'yarn'
          node-version: "20.9.0"

      - name: Install dependencies
        run: yarn --immutable

      - name: Prettier
        run: yarn prettier

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Verify player shell
        run: yarn verify:player-shell

      - name: Verify Fire TV receiver
        run: yarn verify:firetv-receiver
